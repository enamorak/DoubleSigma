version: "1"
nodes:
  - id: ethers_v5_to_v6
    name: Apply ethers v5->v6 codemod
    type: automatic
    steps:
      - name: DoubleSigma JSSG (ast-grep) transforms
        js-ast-grep:
          # Pre-bundled via `npm run registry:bundle` (esbuild); avoids Rolldown UnresolvedEntry on some Windows setups.
          js_file: "codemod.bundled.mjs"
          language: "tsx"
          include:
            - "**/*.{ts,tsx,js,jsx}"
          exclude:
            - "**/node_modules/**"
