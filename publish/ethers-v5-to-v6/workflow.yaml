version: "1"
nodes:
  - id: ethers_v5_to_v6
    name: Apply ethers v5->v6 codemod
    type: automatic
    steps:
      - name: DoubleSigma JSSG (ast-grep) transforms
        js-ast-grep:
          js_file: "scripts/codemod.ts"
          language: "tsx"
          include:
            - "**/*.{ts,tsx,js,jsx}"
          exclude:
            - "**/node_modules/**"
